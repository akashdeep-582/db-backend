service: proplist-visit-service

useDotenv: true

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-southeast-2
  httpApi:
    id: !ImportValue proplist-api-gateway-HttpApiId
  environment:
    DB_HOST: ${env:DB_HOST}
    DB_PORT: ${env:DB_PORT}
    DB_NAME: ${env:DB_NAME}
    DB_USER: ${env:DB_USER}
    DB_PASSWORD: ${env:DB_PASSWORD}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}
    AWS_REGION_NAME: ap-southeast-2

functions:
  requestVisit:
    handler: src/requestVisit.handler
    events:
      - httpApi:
          path: /api/visits
          method: POST
          authorizer:
            id: ugclgq

  getVisits:
    handler: src/getVisits.handler
    events:
      - httpApi:
          path: /api/visits
          method: GET
          authorizer:
            id: ugclgq

  updateVisit:
    handler: src/updateVisit.handler
    events:
      - httpApi:
          path: /api/visits/{id}
          method: PATCH
          authorizer:
            id: ugclgq
